stages:
  - format
  - analyze
  - test
  - integration-test

.base:
  image: ghcr.io/cirruslabs/flutter:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - dart pub get
    - dart run build_runner build --delete-conflicting-outputs

format:
  extends: .base
  stage: format
  script:
    - dart format . --output=none --set-exit-if-changed

analyze:
  extends: .base
  stage: analyze
  script:
    - dart analyze --fatal-infos

tests:
  extends: .base
  stage: test
  script:
    - dart pub global activate junitreport
    - dart test --reporter json | dart pub global run junitreport:tojunit > test-results.xml
  artifacts:
    when: always
    reports:
      junit: test-results.xml

.voys-tests-base:
  extends: .base
  stage: integration-test
  script:
    - ./run_voys_tests.sh

voys-tests:
  extends: .voys-tests-base
  artifacts:
    when: always
    reports:
      junit: test-results.xml

voys-tests-long:
  extends: .voys-tests-base
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  variables:
    RUN_LONG_TESTS: "true"
  timeout: 2 hours
  artifacts:
    when: always
    reports:
      junit: test-results.xml
